_schema-version: 3.3.0
ID: hrcap
version: 1.0.0
description: "HR CAP Platform Application"
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build shared-db --for postgres --production
        - npm run build:confirm-timesheet
        - npm run build:shared-service
modules:
  - name: hrcap-srv
    type: nodejs
    path: shared-service/gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 1024M
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: hrcap-auth
      - name: hrcap-postgres
  - name: shared-db-postgres-deployer
    type: nodejs
    path: shared-db/gen/pg
    parameters:
      buildpack: nodejs_buildpack
      no-route: true
      no-start: true
      tasks:
        - name: deploy-to-postgresql
          command: npm start
    requires:
      - name: hrcap-postgres
  - name: confirm-timesheet-app-deployer
    type: com.sap.application.content
    path: confirm-timesheet/gen
    requires:
      - name: hrcap-auth
      - name: srv-api
      - name: confirm-timesheet-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    build-parameters:
      build-result: app/
      requires:
        - name: hrcapctsnoconfirm
          artifacts:
            - no-confirm.zip
          target-path: app/
  - name: hrcap
    type: approuter.nodejs
    path: app-router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: hrcap-auth
      - name: hrcap-html5-runtime
      - name: hrcap-destination-service
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}
  - name: hrcapctsnoconfirm
    type: html5
    path: confirm-timesheet/app/no-confirm
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
resources:
  - name: hrcap-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: hrcap-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
    requires:
      - name: app-api
  - name: hrcap-postgres
    type: org.cloudfoundry.managed-service
    parameters:
      service-name: hr-platform-db
      service: postgresql-db
      service-plan: free
  - name: confirm-timesheet-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: hrcap-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
  - name: hrcap-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: false
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: ui5
                URL: https://ui5.sap.com
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
      service: destination
      service-name: hrcap-destination-service
      service-plan: lite
